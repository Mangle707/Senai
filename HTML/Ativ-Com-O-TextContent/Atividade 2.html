<!DOCTYPE html>
<html lang="pt-bt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 2</title>
</head>
<body>
    <p id="resultado"></p>
    <label for="">Idade</label>
    <input type="text" id="inp_idade" placeholder="Digite sua idade">

    <button onclick="mostrar_idade()">Clicar</button>

    <script>
        function mostrar_idade(){
            let idade = document.getElementById("inp_idade").value
            document.getElementById("resultado").textContent = `A Sua idade é ${idade}`

        }
    </script>
</body>
</html>
