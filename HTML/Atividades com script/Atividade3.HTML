<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 3</title>
</head>
<body>
    <input type ="text" id="nome" placeholder="Digite seu nome">
    <button onclick="mostrarnome()">Mostrar</button>
    <p id="mensagem"></p>

    <script>
      function mostrarnome(){
        let nomePessoa = document.getElementById('nome').value;
        var aviso = document.getElementById('mensagem');
       
        if (nomePessoa.length < 3 ){
            aviso.innerText = "Digite seu nome";
         alert("Nome muito curto tente novamente");
        }
        else{
        alert('Olá, ' + nomePessoa);
        }
      }
    </script>
</body>
</html>
