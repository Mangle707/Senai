<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <input id="nome">

<button onclick="mostrar()">Mostrar</button>

<p id="resultado"></p>

<script>
function mostrar(){
  let nome = document.getElementById("nome").value/*Estava sem o value no final*/
  document.getElementById("resultado").innerText = nome
}
</script>
</body>
