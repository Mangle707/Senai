<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro 6</title>
</head>
<body>
    <input id="nome">

<button onclick="mostrar()">Mostrar</button>

<p id="resultado"></p>

<script>
function mostrar(){
  let nome = document.getElementById("nome").value

  document.getElementById("resultado").innerHTML =
    "<b>Nome: </b>" + nome // Adicionado o sinal de + para concatenar
}
</script>
</body>
</html>
