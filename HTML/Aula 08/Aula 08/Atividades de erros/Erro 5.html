<body>
    <input id="cidade">

<button onclick="mostrar()">Mostrar</button>

<p id="resultado"></p>

<script>
function mostrar(){
  let cidade = document.getElementById("cidade").value
                // Corrigido de "Resultado" para "resultado"
  document.getElementById("resultado").innerText =
    "Você mora em " + cidade
}
</script>
